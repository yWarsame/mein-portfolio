<!DOCTYPE html>
<!-- Dokumenttyp: Sagt dem Browser, dass es sich um HTML5 handelt -->
<html lang="de">
<!-- Sprache auf Deutsch gesetzt (für Screenreader/SEO) -->

<head>
    <!-- ===== META-INFORMATIONEN ===== -->
    <meta charset="UTF-8">
    <!-- Zeichenkodierung UTF-8 (ermöglicht Umlaute/Sonderzeichen) -->

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Für ältere Internet Explorer – zwingt sie zum modernen Modus -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Skaliert die Seite richtig auf Mobilgeräten (Responsive Design) -->

    <!-- ===== EXTERNE RESSOURCEN ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Font Awesome Icons (für Social Media Icons etc.) -->

    <link rel="stylesheet" href="style.css">
    <!-- Eigene CSS-Datei – hier kommt dein Styling rein -->

    <!-- ===== SEITENTITEL ===== -->
    <title>Yasin Warsame</title>
    <!-- Wird im Browser-Tab angezeigt (wichtig für SEO) -->
</head>

<body>
    <!-- ===== HEADER / NAVIGATIONSLEISTE ===== -->
    <header>
        <!-- Logo-Bereich: Klickbar, führt zur Startseite -->
        <a href="#" class="logo">Yasin Warsame</a>
        <!-- # ist ein Platzhalter – später durch echten Link ersetzen -->

        <!-- Navigationsmenü -->
        <nav class="navigation">
            <a href="#about">Über mich</a>

            <a href="#projects">Projekten</a>

            <a href="#certificates">Zertifikate</a>
            
            <a href="#contact">Kontakt</a>
    
        </nav>
    </header>

</body>
<!-- Ende des sichtbaren Bereichs -->

</html>
<!-- Ende des HTML-Dokuments -->
